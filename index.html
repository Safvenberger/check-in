
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svedea Quiz</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --dark:      #005073;
      --accent:    #91CFC9;
      --highlight: #FFE25D;
      --bg:        #D7BFA8;
      --light:     #EBDFD3;
      --gray:      #7A8899;
      --white:     #FFFFFF;
      --shadow-sm: rgba(0,0,0,0.06);
      --shadow-md: rgba(0,0,0,0.10);
      --header-dim: rgba(255,255,255,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
    .app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }
    .header { background: var(--dark); color: var(--white); padding: 20px; text-align: center; }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header p { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .progress-bar { display: flex; gap: 4px; margin-top: 12px; }
    .progress-bar div { flex: 1; height: 4px; border-radius: 2px; background: var(--header-dim); transition: background 0.3s; }
    .progress-bar div.done { background: var(--highlight); }
    .screen { flex: 1; padding: 28px 20px; display: flex; flex-direction: column; gap: 20px; }
    .hidden { display: none !important; }
    .logo { font-size: 52px; text-align: center; }
    .title { font-size: 24px; font-weight: 800; color: var(--dark); text-align: center; }
    .subtitle { font-size: 14px; color: var(--gray); text-align: center; line-height: 1.5; }
    input[type="text"] { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px solid var(--light); font-size: 16px; outline: none; background: var(--white); color: var(--dark); }
    input[type="text"]:focus { border-color: var(--dark); }
    .btn { width: 100%; padding: 15px; background: var(--dark); color: var(--white); border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: var(--light); color: var(--dark); }
    .btn-gold { background: var(--highlight); color: var(--white); }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }
    .question-text { font-size: 19px; font-weight: 700; color: var(--dark); text-align: center; line-height: 1.4; }
    .score-big { font-size: 56px; font-weight: 800; color: var(--accent); text-align: center; }
    .slider-wrap { display: flex; align-items: center; gap: 10px; }
    .slider-wrap span { font-size: 11px; color: var(--gray); min-width: 50px; text-align: center; }
    input[type="range"] { flex: 1; accent-color: var(--accent); height: 6px; cursor: pointer; }
    .personality-card { background: var(--white); border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 20px var(--shadow-md); }
    .personality-emoji { font-size: 56px; margin-bottom: 8px; }
    .personality-title { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
    .personality-desc { font-size: 13px; color: var(--gray); line-height: 1.6; }
    .breakdown { display: flex; flex-direction: column; gap: 10px; }
    .breakdown-row label { font-size: 11px; color: var(--dark); display: flex; justify-content: space-between; margin-bottom: 3px; }
    .breakdown-row label span { color: var(--accent); font-weight: 700; }
    .bar-bg { height: 6px; background: var(--light); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
    .lb-list { display: flex; flex-direction: column; gap: 10px; }
    .lb-card { background: var(--white); border-radius: 14px; padding: 14px; box-shadow: 0 2px 8px var(--shadow-sm); border: 2px solid transparent; }
    .lb-card.first { border-color: var(--highlight); box-shadow: 0 4px 16px var(--shadow-md); }
    .lb-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .lb-medal { font-size: 22px; min-width: 28px; }
    .lb-rank { font-size: 13px; font-weight: 700; color: var(--gray); min-width: 28px; }
    .lb-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--dark); color: var(--white); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .lb-name { flex: 1; font-size: 14px; font-weight: 700; color: var(--dark); }
    .lb-score { font-size: 18px; font-weight: 800; color: var(--accent); }
    .refresh-row { display: flex; justify-content: space-between; align-items: center; }
    .refresh-row h2 { font-size: 16px; font-weight: 700; color: var(--dark); }
    .btn-refresh { padding: 8px 14px; background: var(--light); border: none; border-radius: 8px; font-size: 13px; font-weight: 700; color: var(--dark); cursor: pointer; }
    .nav-tabs { display: flex; background: var(--white); border-top: 1px solid var(--light); }
    .nav-tab { flex: 1; padding: 14px; text-align: center; font-size: 12px; font-weight: 700; color: var(--gray); cursor: pointer; border: none; background: none; }
    .nav-tab.active { color: var(--dark); border-top: 2px solid var(--dark); }
    .empty { text-align: center; color: var(--gray); font-size: 14px; padding: 40px 0; }
  </style>
</head>
<body>
<div class="app">

  <div id="screen-name" class="screen" style="justify-content: center;">
    <div class="logo">🎯</div>
    <div class="title">Svedea Quiz</div>
    <div class="subtitle">Svara på 7 påståenden med en slider.<br>Ditt svar = dina poäng!</div>
    <input type="text" id="input-name" placeholder="Ange ditt namn..." />
    <button class="btn" id="btn-start" disabled onclick="startQuiz()">Starta →</button>
    <button class="btn btn-secondary" onclick="showLeaderboard()">Se leaderboard 🏆</button>
  </div>

  <div id="screen-quiz" class="hidden">
    <div class="header">
      <p id="q-counter">Fråga 1 av 7</p>
      <h1 id="q-header">Quiz</h1>
      <div class="progress-bar" id="progress-bar">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div>
      </div>
    </div>
    <div class="screen">
      <div class="question-text" id="question-text"></div>
      <div class="score-big" id="score-display">50</div>
      <div class="slider-wrap">
        <span id="slider-left">Inte alls</span>
        <input type="range" min="0" max="100" value="50" id="slider" oninput="updateSlider(this.value)" />
        <span id="slider-right">Absolut</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-prev" onclick="prevQ()">← Tillbaka</button>
        <button class="btn" id="btn-next" onclick="nextQ()">Nästa →</button>
      </div>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <div class="header">
      <h1>Ditt resultat 🎉</h1>
      <p id="result-total-header"></p>
    </div>
    <div class="screen">
      <div class="personality-card">
        <div class="personality-emoji" id="p-emoji"></div>
        <div class="personality-title" id="p-title"></div>
        <div class="personality-desc" id="p-desc"></div>
      </div>
      <div class="breakdown" id="breakdown"></div>
      <button class="btn btn-gold" onclick="showLeaderboard()">Se leaderboard 🏆</button>
    </div>
  </div>

  <div id="screen-leaderboard" class="hidden">
    <div class="header">
      <h1>🏆 Leaderboard</h1>
      <p id="lb-subtitle">Laddar...</p>
    </div>
    <div class="screen">
      <div class="refresh-row">
        <h2 id="lb-count"></h2>
        <button class="btn-refresh" onclick="loadLeaderboard()">🔄 Uppdatera</button>
      </div>
      <div class="lb-list" id="lb-list"></div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab" onclick="goHome()">← Hem</button>
      <button class="nav-tab active">🏆 Leaderboard</button>
    </div>
  </div>

</div>
<script>
  // ─── KONFIGURERA HÄR ───────────────────────────────────────────────
  const SUPABASE_URL = 'https://ltfckjnuvegtzmvzovuw.supabase.co';       // t.ex. https://xxxx.supabase.co
  const SUPABASE_KEY = 'sb_publishable_TXCRJAGU7oD_igMMHGw7uw_bjIMijUw';  // din anon/public nyckel
  const TABLE = 'quiz_results';
  // ───────────────────────────────────────────────────────────────────

 const QUESTIONS = [
    { text: "Hur taggad var du på Melodifestivalen i år?",                                            left: "Jag inser knappt att det pågår",     right: "Jag bokar lördagskvällen som om det vore VM‑final"    },
    { text: "Hur mycket “schlager” är du i själ och hjärta?",                                         left: "Hårdrock / techno / allt utom schlager",  right: "Krona på huvudet och glitter i blodomloppet"   },
    { text: "Hur sannolikt är det att du röstar i Mello?",                                            left: "Aldrig i livet",     right: " Ringer, SMS:ar och app‑klickar som om jag fick provision"    },
    { text: "Hur stor är chansen att du kan hela refrängen till en Mello‑låtfrån de senaste 3 åren?", left: "Ingen chans alls",  right: "Jag skulle kunna ersätta artisten live"   },
    { text: "Hur mycket påverkar scenkläder och glitter ditt betyg på ett bidrag?",                   left: "Inte alls", right: "Outfiten avgör allt – låten är sekundär"   },
    { text: "Hur mycket drama vill du ha i Mellosändningen?",                                         left: "Inga känslostormar tack",   right: "Maximalt – ge mig tårar, rivalitet och tabloidrubriker"     },
    { text: "Hur gärna skulle du själv vilja stå på Mello‑scenen?",                                   left: "Jag gömmer mig när folk fyller år och börjar sjunga",   right: "Sätter mig på turné så fort ni säger var casting är"   },
  ];

  const PERSONALITIES = [
    { max: 100, emoji: "😤", title: "Melodifestivalförnekaren", desc: "'Är det detta jag betalar skatt för?'" },
    { max: 200, emoji: "🙄", title: "Oundviklig tittaren", desc: "Du råkar alltid se finalen ändå — 'för att det inte finns något annat på TV'" },
    { max: 300, emoji: "🛋️", title: "Soffexperten", desc: "Du tittar men hejar på fel låt varje år och förstår inte varför Sverige inte lyssnar" },
    { max: 400, emoji: "🎤", title: "Hummaren", desc: "Du nynnar på Diggiloo Diggiley i hissen och låtsas att du inte kan texten" },
    { max: 500, emoji: "🎵", title: "Schemaläggaren", desc: "Lördagar i feb/mars är bokade i kalendern. Det är bara så" },
    { max: 600, emoji: "🤓", title: "Deltävlingsnörden", desc: "Du har åsikter om varje deltävling, varje koreografi, varje outfitvval och varför Måns är med i år igen" },
    { max: 700, emoji: "🐦‍🔥", title: "Mellofanatikern", desc: "Du lever och andas Mello och har Edward af Sillén på speed-dial" },
  ];

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let userName = '', answers = Array(QUESTIONS.length).fill(50), current = 0;

  document.getElementById('input-name').addEventListener('input', e => {
    document.getElementById('btn-start').disabled = !e.target.value.trim();
  });

  function show(id) {
    ['screen-name','screen-quiz','screen-result','screen-leaderboard'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }

  function goHome() { show('screen-name'); }

  function startQuiz() {
    userName = document.getElementById('input-name').value.trim();
    answers = Array(QUESTIONS.length).fill(50);
    current = 0;
    show('screen-quiz');
    renderQ();
  }

  function renderQ() {
    const q = QUESTIONS[current];
    document.getElementById('q-counter').textContent = `Fråga ${current + 1} av ${QUESTIONS.length}`;
    document.getElementById('question-text').textContent = q.text;
    document.getElementById('slider-left').textContent = q.left;
    document.getElementById('slider-right').textContent = q.right;
    document.getElementById('slider').value = answers[current];
    document.getElementById('score-display').textContent = answers[current];
    document.getElementById('btn-prev').disabled = current === 0;
    document.getElementById('btn-next').textContent = current === QUESTIONS.length - 1 ? 'Klar! 🎉' : 'Nästa →';
    const bars = document.getElementById('progress-bar').children;
    for (let i = 0; i < bars.length; i++) bars[i].classList.toggle('done', i < current + 1);
  }

  function updateSlider(v) {
    answers[current] = Number(v);
    document.getElementById('score-display').textContent = v;
  }

  function nextQ() {
    if (current < QUESTIONS.length - 1) { current++; renderQ(); }
    else finishQuiz();
  }

  function prevQ() { if (current > 0) { current--; renderQ(); } }

  async function finishQuiz() {
    const total = answers.reduce((a, b) => a + b, 0);
    const p = PERSONALITIES.find(p => total <= p.max) || PERSONALITIES[PERSONALITIES.length - 1];
    document.getElementById('result-total-header').textContent = `${total} poäng av 700 möjliga`;
    document.getElementById('p-emoji').textContent = p.emoji;
    document.getElementById('p-title').textContent = p.title;
    document.getElementById('p-desc').textContent = p.desc;
    document.getElementById('breakdown').innerHTML = QUESTIONS.map((q, i) => `
      <div class="breakdown-row">
        <label>${q.text} <span>${answers[i]}p</span></label>
        <div class="bar-bg"><div class="bar-fill" style="width:${answers[i]}%"></div></div>
      </div>`).join('');
    show('screen-result');
    try {
      await client.from(TABLE).insert([{ name: userName, answers, total, personality: p.title }]);
    } catch(e) { console.error('Supabase save failed:', e); }
  }

  async function loadLeaderboard() {
    document.getElementById('lb-subtitle').textContent = 'Uppdaterar...';
    document.getElementById('lb-list').innerHTML = '';
    try {
      const { data, error } = await client.from(TABLE).select('*').order('total', { ascending: false });
      if (error) throw error;
      document.getElementById('lb-subtitle').textContent = `${data.length} deltagare`;
      document.getElementById('lb-count').textContent = 'Ranking';
      const medals = ['🥇','🥈','🥉'];
      const initials = n => n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('lb-list').innerHTML = data.length === 0
        ? '<div class="empty">Inga resultat ännu 👀</div>'
        : data.map((p, i) => `
          <div class="lb-card ${i === 0 ? 'first' : ''}">
            <div class="lb-top">
              ${i < 3 ? `<div class="lb-medal">${medals[i]}</div>` : `<div class="lb-rank">${i+1}.</div>`}
              <div class="lb-avatar">${initials(p.name)}</div>
              <div class="lb-name">${p.name}<br><small style="font-weight:400;color:var(--gray)">${p.personality || ''}</small></div>
              <div class="lb-score">${p.total}p</div>
            </div>
            <div class="bar-bg"><div class="bar-fill" style="width:${(p.total/700)*100}%"></div></div>
          </div>`).join('');
    } catch(e) {
      document.getElementById('lb-subtitle').textContent = 'Kunde inte ladda';
      console.error(e);
    }
  }

  function showLeaderboard() { show('screen-leaderboard'); loadLeaderboard(); }
</script>
</body>
</html>
